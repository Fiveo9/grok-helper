services:
  grok-helper:
    build:
      context: .
      dockerfile: Dockerfile
    image: grok-helper:latest
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_ENABLED: ${LOG_FILE_ENABLED:-true}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8001
      GROK_HELPER_ADMIN_USERNAME: ${GROK_HELPER_ADMIN_USERNAME:-admin}
      GROK_HELPER_ADMIN_PASSWORD: ${GROK_HELPER_ADMIN_PASSWORD:?Set GROK_HELPER_ADMIN_PASSWORD in .env}
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      GROK_REGISTER_SOURCE_DIR: /app
      GROK_REGISTER_PYTHON: /usr/local/bin/python
      GROK_REGISTER_CONSOLE_MAX_CONCURRENT_TASKS: ${GROK_REGISTER_CONSOLE_MAX_CONCURRENT_TASKS:-1}
      GROK_REGISTER_CONSOLE_POLL_INTERVAL: ${GROK_REGISTER_CONSOLE_POLL_INTERVAL:-2}
      GROK_REGISTER_CONSOLE_STALL_TIMEOUT: ${GROK_REGISTER_CONSOLE_STALL_TIMEOUT:-300}
      GROK_REGISTER_DEFAULT_RUN_COUNT: ${GROK_REGISTER_DEFAULT_RUN_COUNT:-50}
      GROK_REGISTER_DEFAULT_PROXY: ${GROK_REGISTER_DEFAULT_PROXY:-}
      GROK_REGISTER_DEFAULT_BROWSER_PROXY: ${GROK_REGISTER_DEFAULT_BROWSER_PROXY:-}
      GROK_REGISTER_DEFAULT_TEMP_MAIL_PROVIDER: ${GROK_REGISTER_DEFAULT_TEMP_MAIL_PROVIDER:-}
      GROK_REGISTER_DEFAULT_TEMP_MAIL_API_BASE: ${GROK_REGISTER_DEFAULT_TEMP_MAIL_API_BASE:-}
      GROK_REGISTER_DEFAULT_TEMP_MAIL_ADMIN_EMAIL: ${GROK_REGISTER_DEFAULT_TEMP_MAIL_ADMIN_EMAIL:-}
      GROK_REGISTER_DEFAULT_TEMP_MAIL_ADMIN_PASSWORD: ${GROK_REGISTER_DEFAULT_TEMP_MAIL_ADMIN_PASSWORD:-}
      GROK_REGISTER_DEFAULT_TEMP_MAIL_DOMAIN: ${GROK_REGISTER_DEFAULT_TEMP_MAIL_DOMAIN:-}
      GROK_REGISTER_DEFAULT_TEMP_MAIL_SITE_PASSWORD: ${GROK_REGISTER_DEFAULT_TEMP_MAIL_SITE_PASSWORD:-}
      GROK_REGISTER_DEFAULT_API_ENDPOINT: ${GROK_REGISTER_DEFAULT_API_ENDPOINT:-}
      GROK_REGISTER_DEFAULT_API_TOKEN: ${GROK_REGISTER_DEFAULT_API_TOKEN:-}
      GROK_REGISTER_DEFAULT_API_APPEND: ${GROK_REGISTER_DEFAULT_API_APPEND:-true}
      # 注册成功后把 sso 换成 CPA 的 xai auth json；写入下方挂载的 CPA auth 目录。
      GROK_REGISTER_CPA_EXPORT_ENABLED: ${GROK_REGISTER_CPA_EXPORT_ENABLED:-true}
      GROK_REGISTER_CPA_AUTH_DIR: ${GROK_REGISTER_CPA_AUTH_DIR:-}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-}
    ports:
      - "127.0.0.1:${REGISTER_HOST_PORT:-8001}:8001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # 可选：把 CPA 的 auth 目录挂进来，注册成功即自动写入 xai-*.json。
      # 需同时设置 GROK_REGISTER_CPA_AUTH_DIR=/app/cpa-auths。
      # - ${CPA_AUTH_HOST_DIR:-/opt/cli-proxy-api-official/auths}:/app/cpa-auths
    restart: unless-stopped
